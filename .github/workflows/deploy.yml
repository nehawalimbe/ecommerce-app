name: Deploy React E-Commerce App

on:
  push:
    branches:
      - master
permissions: 
  contents: read
  pages: write
  id-token: write
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Applications
        run: npm run build

      - name: Configure Github Pages
        uses: actions/configure-pages@v5
        with:
          path: ./dist
